<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠팡 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">
    <div class="flex justify-center mb-6">
      <img src="https://image7.coupangcdn.com/image/coupang/common/logo_coupang_w350.png" alt="쿠팡 로고" class="h-10">
    </div>
    <form>
      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="email">이메일</label>
        <input type="email" id="email" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="이메일 입력">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 mb-1" for="password">비밀번호</label>
        <input type="password" id="password" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="비밀번호 입력">
      </div>
      <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">로그인</button>
    </form>
    <div class="flex justify-between mt-4 text-sm text-gray-600">
      <a href="#" class="hover:underline">비밀번호 찾기</a>
      <a href="#" class="hover:underline">회원가입</a>
    </div>
  </div>
</body>
</html>
